<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programming languages Atlas</title>
    <link rel="stylesheet" href="language.css">
</head>
<body>
    <div class="navbar">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="categories.html" class="nav-btn">Categories</a>
    </div>
    <div class="hero-card">
        <img id="logo">
        <h1 id="name"></h1>
        <p id="creator"></p>
    </div>
    <div class="info-card">
        <h2>Quick Facts</h2>
        <div class="info-row">
            <span>Appeared</span>
            <span id="appeared_year"></span>
        </div>
        <div class="info-row">
            <span>Paradigm</span>
            <span id="primary_paradigm"></span>
        </div>
        <div class="info-row">
            <span>Typing</span>
            <span id="typing_style"></span>
        </div>
        <div class="info-row">
            <span>Execution</span>
            <span id="execution_type"></span>
        </div>
        <div class="info-row">
            <span>Primary Use</span>
            <span id="primary_use"></span>
        </div>
        <div class="info-row">
            <span>Extension</span>
            <span id="file_extension"></span>
        </div>
    </div>
    <div class="about-card">
        <h2>About</h2>
        <p id="about"></p>
    </div>
    <div class="reference-card">
        <h2>References</h2>
        <div id="references"></div>
    </div>
<script src="language.js"></script>
</body>
</html>
